<!DOCTYPE html>
<html>

<head>

    <title>Employee Policy Agentic AI</title>

    <link rel="stylesheet" href="style.css?v=feedback-dashboard-1">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>HR Copilot</h2>

        <button onclick="toggleTheme()">
            Dark Mode
        </button>

        <button onclick="showSection('chat')">
            Chat
        </button>

        <button onclick="showSection('analytics')">
            Analytics
        </button>

        <button onclick="showSection('monitoring')">
            Monitoring
        </button>

        <button onclick="showSection('feedback')">
            Feedback
        </button>

        <hr>

        <h3>Chat History</h3>

        <div id="history-list"></div>

    </div>

    <div class="content">

        <div id="chat-section">

            <h1>Employee Policy Assistant</h1>

            <div id="chat-box"></div>

            <div id="confirmation-box"></div>

            <div class="input-area">

                <input
                    type="text"
                    id="question"
                    placeholder="Ask your question..."
                >

                <button onclick="sendQuestion()">
                    Send
                </button>

                <button onclick="clearChat()">
                    Clear
                </button>

            </div>

        </div>

        <div
            id="analytics-section"
            class="hidden"
        >

            <h1>Analytics</h1>

            <div id="analytics-content"></div>

        </div>

        <div
            id="monitoring-section"
            class="hidden"
        >

            <h1>Monitoring</h1>

            <div id="monitoring-content"></div>

        </div>

        <div
            id="feedback-section"
            class="hidden"
        >

            <h1>Feedback</h1>

            <div id="feedback-content"></div>

        </div>

    </div>

</div>

<script src="app.js?v=feedback-dashboard-1"></script>

</body>

</html>
